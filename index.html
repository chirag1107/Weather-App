<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌤️ Premium Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>🌤️ Weather App</h1>
      <button class="settings-btn" id="openSettingsBtn" title="API Settings" aria-label="Open Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div class="mode-container">
      <span class="mode-label">Mock Data Mode (No Key Required)</span>
      <label class="switch">
        <input type="checkbox" id="mockModeToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <main>
      <div class="search-box">
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="city" placeholder="Enter city name..." autocomplete="off">
        </div>
        <button class="search-btn" id="searchBtn">Get Weather</button>
      </div>

      <div id="weather">
        <!-- Content will be injected dynamically -->
        <div class="placeholder-view">
          <div class="placeholder-icon">🌤️</div>
          <p>Search for a city to display weather statistics</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">API Settings</h2>
        <button class="modal-close" id="closeSettingsBtn" aria-label="Close Settings">&times;</button>
      </div>
      <div class="modal-body">
        <p>To fetch live weather data, you need an API key from OpenWeatherMap. If you do not have one, you can get a key by signing up at <a href="https://openweathermap.org/" target="_blank" rel="noopener noreferrer">openweathermap.org</a>.</p>
        <div class="form-group">
          <label for="apiKeyInput" style="display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--text-secondary);">OpenWeatherMap API Key</label>
          <input type="password" id="apiKeyInput" class="modal-input" placeholder="Paste your API key here">
        </div>
        <button class="modal-save-btn" id="saveApiKeyBtn">Save Key</button>
      </div>
    </div>
  </div>

  <script src="weather-app.js"></script>
</body>
</html>
